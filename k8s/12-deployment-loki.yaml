# ============================================================
# Deployment + Service：Loki（日誌聚合）
# docker-compose 對應: services.loki
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: stock-alert
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:latest
          # docker-compose 對應:
          #   command: -config.file=/etc/loki/local-config.yaml
          # 使用 Loki 預設內建設定，不需要額外的 ConfigMap
          args:
            - "-config.file=/etc/loki/local-config.yaml"
          ports:
            - containerPort: 3100
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # ★ Loki 資料持久化
          # docker-compose 版本：無 named volume，重啟後日誌消失
          # 正式環境應加上 PVC + 物件儲存後端（S3）
          # 這裡用 emptyDir 對應 compose 的行為（重啟後清除）
          volumeMounts:
            - name: loki-data
              mountPath: /loki
      volumes:
        - name: loki-data
          emptyDir: {}   # 學習用；正式環境改 PVC
---
# ── Service ──────────────────────────────────────────────────
# docker-compose 對應: ports: "3100:3100"（目前對外，改為內部）
# 只有 Promtail（推送日誌）和 Grafana（查詢日誌）需要連 Loki
# 改用 ClusterIP 不對外暴露
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: stock-alert
spec:
  type: ClusterIP   # ★ 比 compose 更安全
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
