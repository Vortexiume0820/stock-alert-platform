# ============================================================
# Secret
# docker-compose 對應: env_file: .env
# ------------------------------------------------------------
# K8s Secret vs .env 的核心差異：
#
#   .env（你現在的做法）：
#     - 明文存在本機，靠 .gitignore 防止 commit
#     - 只有本機用，換台機器就要重設
#
#   K8s Secret：
#     - 值以 base64 編碼（注意：這不是加密，只是編碼）
#     - 存在 etcd（K8s 的資料庫），整個叢集都能用
#     - 正式環境會搭配 Vault / AWS Secrets Manager 動態注入
#     - 可以設定 RBAC，只允許特定 ServiceAccount 讀取
#
# 如何產生 base64：
#   echo -n "https://hooks.slack.com/your-url" | base64
#   echo -n "your-api-key" | base64
#
# 注意：echo -n 的 -n 不可少，否則會把換行符號也編碼進去
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: stock-alert-secrets
  namespace: stock-alert  # 必須和 Namespace 一致
type: Opaque
data:
  # 將你的實際值 base64 編碼後填入，以下為空白佔位符
  SLACK_WEBHOOK_URL: ""   # echo -n "https://hooks.slack.com/..." | base64
  API_KEY: ""             # echo -n "your-api-key" | base64
