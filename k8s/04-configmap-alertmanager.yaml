# ============================================================
# ConfigMap：AlertManager 設定
# docker-compose 對應: volumes: ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
# ------------------------------------------------------------
# 安全性注意：
#   docker-compose 版本用 start.sh + envsubst 把 Webhook URL 注入
#   K8s 版本應把 slack_api_url 從 Secret 注入，而非寫死在 ConfigMap
#
#   正式做法是用 AlertManager 的 --config.file 搭配
#   configmap-reloader sidecar 或直接使用 Prometheus Operator
#   這裡為了簡化，使用環境變數替換的方式說明概念
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: stock-alert
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # 正式環境：slack_api_url 不寫在這裡
      # 改用 Secret 掛載或 alertmanager 的 --config.file 支援環境變數展開
      slack_api_url: 'YOUR_SLACK_WEBHOOK_URL'

    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s        # 同一批告警等 10 秒後一起發（避免洗版）
      group_interval: 5m     # 同一 group 每 5 分鐘才能再發
      repeat_interval: 1h    # 未解除的告警每小時重複提醒
      receiver: 'slack-warning'
      routes:
        - match:
            severity: critical
          receiver: 'slack-critical'
        - match:
            severity: warning
          receiver: 'slack-warning'

    receivers:
      - name: 'slack-critical'
        slack_configs:
          - channel: '#alert'
            title: '🚨 [CRITICAL] {{ .CommonLabels.alertname }}'
            text: '{{ .CommonAnnotations.description }}'
            send_resolved: true
            color: '#FF0000'

      - name: 'slack-warning'
        slack_configs:
          - channel: '#alert'
            title: '⚠️ [WARNING] {{ .CommonLabels.alertname }}'
            text: '{{ .CommonAnnotations.description }}'
            send_resolved: true
            color: '#FFA500'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname']
